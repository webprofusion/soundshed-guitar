  build-macos-arm64:
    name: Build macOS Installer (arm64)
    if: ${{ inputs.build_macos && (inputs.macos_targets == 'all' || inputs.macos_targets == 'arm64') }}
    runs-on: macos-latest
    env:
      MACOS_TARGET: arm64
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: core/ui/package-lock.json

