          key: ${{ runner.os }}-juce-source-v2

      - name: Fetch JUCE source
        run: |
          if [ "${{ steps.cache-juce-source.outputs.cache-hit }}" = "true" ]; then
            echo "JUCE source restored from cache"
          elif [ -f "juce/JUCE/CMakeLists.txt" ]; then
            echo "JUCE source already present at juce/JUCE"
          else
            git clone --depth 1 https://github.com/juce-framework/JUCE.git juce/JUCE
          fi

      - name: Build macOS release package
        run: bash ./build_macos.sh --pkg --dist-dir macos-dist-arm64

      - name: Export JUCE build env
        run: |
          if [ ! -f "juce/.env" ]; then
            echo "Expected juce/.env after build, but it was not found."
            exit 1
          fi
          cat juce/.env >> "$GITHUB_ENV"

      - name: Rename macOS package
        id: rename-package
        run: |
          PACKAGE_PATH="macos-dist-arm64/SoundshedGuitar-${VERSION}.pkg"
          RENAMED_PATH="macos-dist-arm64/SoundshedGuitar-${VERSION}-macOS-arm64.pkg"

          if [ ! -f "$PACKAGE_PATH" ]; then
            echo "Expected macOS package not found: $PACKAGE_PATH"
            exit 1
          fi

          mv "$PACKAGE_PATH" "$RENAMED_PATH"
          echo "path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v6
        with:
          name: SoundshedGuitar-macOS-arm64
          path: ${{ steps.rename-package.outputs.path }}

      - name: Upload artifacts to R2
        if: ${{ inputs.upload_r2 }}
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2-bucket: soundshed-guitar-builds
          source-dir: ${{ steps.rename-package.outputs.path }}
          destination-dir: ./build-artifacts/macos/arm64
          keep-file-fresh: true

  build-macos-universal:
    name: Build macOS Installer (universal)
    if: ${{ inputs.build_macos && (inputs.macos_targets == 'all' || inputs.macos_targets == 'universal') }}
    runs-on: macos-latest
    env:
      MACOS_TARGET: universal
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: core/ui/package-lock.json

      - name: Install UI dependencies
        working-directory: core/ui
        run: npm ci

      - name: Cache JUCE source
        id: cache-juce-source
        uses: actions/cache@v5
        with:
          path: juce/JUCE
          key: ${{ runner.os }}-juce-source-v2

      - name: Fetch JUCE source
        run: |
          if [ "${{ steps.cache-juce-source.outputs.cache-hit }}" = "true" ]; then
            echo "JUCE source restored from cache"
          elif [ -f "juce/JUCE/CMakeLists.txt" ]; then
            echo "JUCE source already present at juce/JUCE"
          else
            git clone --depth 1 https://github.com/juce-framework/JUCE.git juce/JUCE
          fi

      - name: Build macOS release package
        run: bash ./build_macos.sh --universal --pkg --dist-dir macos-dist-universal

      - name: Export JUCE build env
        run: |
          if [ ! -f "juce/.env" ]; then
            echo "Expected juce/.env after build, but it was not found."
            exit 1
          fi
          cat juce/.env >> "$GITHUB_ENV"

      - name: Rename macOS package
        id: rename-package
        run: |
          PACKAGE_PATH="macos-dist-universal/SoundshedGuitar-${VERSION}.pkg"
          RENAMED_PATH="macos-dist-universal/SoundshedGuitar-${VERSION}-macOS-universal.pkg"

          if [ ! -f "$PACKAGE_PATH" ]; then
            echo "Expected macOS package not found: $PACKAGE_PATH"
            exit 1
          fi

          mv "$PACKAGE_PATH" "$RENAMED_PATH"
          echo "path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package
        uses: actions/upload-artifact@v6
        with:
          name: SoundshedGuitar-macOS-universal
          path: ${{ steps.rename-package.outputs.path }}

      - name: Upload artifacts to R2
        if: ${{ inputs.upload_r2 }}
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          r2-bucket: soundshed-guitar-builds
          source-dir: ${{ steps.rename-package.outputs.path }}
          destination-dir: ./build-artifacts/macos/universal
          keep-file-fresh: true

  build-linux-x64:
    name: Build Linux Archive (x64)
    if: ${{ inputs.build_linux && (inputs.linux_targets == 'all' || inputs.linux_targets == 'x64') }}
