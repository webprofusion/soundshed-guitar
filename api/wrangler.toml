name = "soundshed-guitar-api"
main = "src/index.ts"
compatibility_date = "2026-02-17"
workers_dev = true

[vars]
ENVIRONMENT = "production"
COOKIE_NAME = "ss_session"
SESSION_TTL_SECONDS = "2592000"
MAGIC_LINK_TTL_SECONDS = "900"
SENDGRID_FROM_EMAIL = "no-reply@soundshed.com"
SENDGRID_FROM_NAME = "Soundshed"
TONE3000_API_BASE = "https://www.tone3000.com/api/v1"

[[d1_databases]]
binding = "DB"
database_name = "soundshed-guitar-api-prod"
database_id = "80cb9fa4-d0bf-4ea8-9aaf-8d7b414cabb8"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "soundshed-guitar-assets-prod"

[ai]
binding = "AI"
