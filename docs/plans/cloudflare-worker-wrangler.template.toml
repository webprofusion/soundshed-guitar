name = "soundshed-presets-api"
main = "src/index.ts"
compatibility_date = "2026-02-17"

workers_dev = false

routes = [
  { pattern = "api.guitar.soundshed.com/*", zone_name = "soundshed.com" }
]

[vars]
APP_BASE_URL = "https://app.soundshed.com"
WEB_BASE_URL = "https://soundshed.com"
COOKIE_NAME = "ss_session"
SESSION_TTL_SECONDS = "2592000"
MAGIC_LINK_TTL_SECONDS = "900"
SIGNED_URL_TTL_SECONDS = "300"

[[d1_databases]]
binding = "DB"
database_name = "soundshed_presets"
database_id = "replace-with-d1-database-id"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "soundshed-presets-assets"
preview_bucket_name = "soundshed-presets-assets-preview"

[[kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "replace-with-kv-id"
preview_id = "replace-with-kv-preview-id"

[[queues.producers]]
binding = "UPLOAD_EVENTS"
queue = "soundshed-upload-events"

[[queues.consumers]]
queue = "soundshed-upload-events"
max_batch_size = 10
max_batch_timeout = 10

[triggers]
crons = ["*/15 * * * *", "5 2 * * *"]

[observability.logs]
enabled = true

[env.dev]
name = "soundshed-presets-api-dev"

[env.dev.vars]
APP_BASE_URL = "http://localhost:5173"
WEB_BASE_URL = "http://localhost:3000"
COOKIE_NAME = "ss_session_dev"
SESSION_TTL_SECONDS = "2592000"
MAGIC_LINK_TTL_SECONDS = "900"
SIGNED_URL_TTL_SECONDS = "300"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "soundshed_presets_dev"
database_id = "replace-with-dev-d1-id"

[[env.dev.r2_buckets]]
binding = "ASSETS"
bucket_name = "soundshed-presets-assets-dev"
preview_bucket_name = "soundshed-presets-assets-dev-preview"

[[env.dev.kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "replace-with-dev-kv-id"
preview_id = "replace-with-dev-kv-preview-id"

[[env.dev.queues.producers]]
binding = "UPLOAD_EVENTS"
queue = "soundshed-upload-events-dev"

[[env.dev.queues.consumers]]
queue = "soundshed-upload-events-dev"
max_batch_size = 10
max_batch_timeout = 10

[env.dev.triggers]
crons = ["*/30 * * * *"]
